# Adicionar em: /etc/nginx/sites-available/crm-api.aprovapm.com.br
# Ativar com: ln -s /etc/nginx/sites-available/crm-api.aprovapm.com.br /etc/nginx/sites-enabled/
# Depois: certbot --nginx -d crm-api.aprovapm.com.br

server {
    listen 80;
    server_name crm-api.aprovapm.com.br;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
